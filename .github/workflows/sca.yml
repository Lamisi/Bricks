name: SCA

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Code Scanning

jobs:
  trivy:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master 2026-07-18
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"          # block PR on HIGH or CRITICAL findings
          format: sarif
          output: trivy.sarif
          ignore-unfixed: true    # suppress CVEs with no available fix

      - name: Upload SARIF to GitHub Code Scanning
        if: always()              # upload even when trivy exits non-zero
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: trivy.sarif
