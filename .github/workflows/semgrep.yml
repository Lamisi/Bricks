name: Semgrep

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write  # required to upload SARIF to GitHub Code Scanning

jobs:
  semgrep:
    name: Static analysis
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/default
          --config p/typescript
          --config p/react
          --config p/nextjs
          --config p/secrets
          --error
          --sarif
          --output semgrep.sarif
        env:
          # Optional: set SEMGREP_APP_TOKEN in repo secrets for dashboard results
          # at https://semgrep.dev. Leave unset to run fully headless.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Code Scanning
        if: always()  # upload even when semgrep exits non-zero
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: semgrep.sarif
